spring:
  application:
    name: rag-brain

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/rag_brain}
    username: ${DB_USERNAME:rag_brain}
    password: ${DB_PASSWORD:local_dev_only}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${DEFAULT_AI_MODEL:claude-haiku-4-5}
          temperature: 0.2
          max-tokens: 1500
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${FALLBACK_AI_MODEL:gpt-4.1-nano}
          temperature: 0.2
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
          dimensions: ${EMBEDDING_DIMENSIONS:1536}

server:
  port: 8080
  max-http-request-header-size: 16KB

# Which domain pack this deployment runs (see packs/ and the platform spec).
brain:
  pack: ${BRAIN_PACK:packs/generic}
  slug: ${BRAIN_SLUG:generic}
  name: ${BRAIN_NAME:Generic Brain}
  providers:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
    grok:
      api-key: ${GROK_API_KEY:}
      base-url: ${GROK_BASE_URL:https://api.x.ai/v1}
      model: ${GROK_MODEL:grok-4.3}
    local:
      base-url: ${LOCAL_LLM_BASE_URL:}
      api-key: ${LOCAL_LLM_API_KEY:}
      model: ${LOCAL_LLM_MODEL:}
  local-llm:
    allowed-hosts: ${LOCAL_LLM_ALLOWED_HOSTS:}
  corpus:
    bucket: ${S3_BUCKET:}
    prefix: ${S3_PREFIX:}
    region: ${AWS_REGION:us-west-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ------------------------------------------------------------
# RAG Brain application configuration
# ------------------------------------------------------------
msfg:
  rag:
    # HTTP timeouts for outbound AI provider/embedding calls. Without these,
    # a hung provider blocks the request thread indefinitely. read-timeout-ms
    # must comfortably exceed normal completion latency.
    ai:
      connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${AI_READ_TIMEOUT_MS:60000}
      # Caps the source context packed into a prompt (cl100k_base tokens). Guards
      # against overflowing a model's context window on large retrievals; the
      # top-ranked chunk is always kept even if it alone exceeds the budget.
      max-context-tokens: ${AI_MAX_CONTEXT_TOKENS:12000}
    routing:
      default-provider: ${DEFAULT_AI_PROVIDER:anthropic}
      fallback-provider: ${FALLBACK_AI_PROVIDER:openai}
    retrieval:
      top-k: ${RETRIEVAL_TOP_K:8}
      min-results: 3
      # Calibrated against text-embedding-3-small: good question->passage
      # matches score ~0.45-0.60 cosine, so 0.35 combined is a real signal.
      confidence-threshold: ${RETRIEVAL_CONFIDENCE_THRESHOLD:0.35}
      # weights for hybrid score merge (must sum to 1.0)
      vector-weight: 0.65
      keyword-weight: 0.35
      # LLM reranking: scores the candidate pool for true relevance before
      # the top-k chunks go to the answer model
      rerank-enabled: ${RETRIEVAL_RERANK_ENABLED:true}
      rerank-candidates: 24
    chunking:
      target-tokens: 1000      # within the 700–1200 spec range
      max-tokens: 1200
      overlap-tokens: 150
    storage:
      path: ${DOCUMENT_STORAGE_PATH:./data/documents}
    admin:
      api-key: ${ADMIN_API_KEY:change-me-local-admin-key}
    cors:
      # comma-separated; production example: https://msfg.us,https://www.msfg.us
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    rate-limit:
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:10}   # per IP on public ask endpoints
      connector-requests-per-minute: ${CONNECTOR_RATE_LIMIT_REQUESTS_PER_MINUTE:60}
      admin-requests-per-minute: ${ADMIN_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
      # X-Forwarded-For is spoofable by direct callers, so it is IGNORED unless
      # the app sits strictly behind a trusted proxy. Set trust-forwarded-for=true
      # only when ALL traffic arrives via your proxy layer, and set
      # trusted-proxy-count to the number of proxies that append to the header
      # (e.g. 1 for Nginx only, 2 for ALB+Nginx).
      trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:false}
      trusted-proxy-count: ${RATE_LIMIT_TRUSTED_PROXY_COUNT:1}

logging:
  level:
    com.msfg.rag: INFO
