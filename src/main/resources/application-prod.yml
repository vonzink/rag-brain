# Production profile overrides. Activate with SPRING_PROFILES_ACTIVE=prod.
#
# ProductionConfigGuard (active only under this profile) aborts startup if the
# admin API key is blank or still the development default, and warns on a
# default DB password or localhost-only CORS.
#
# Actuator is locked down to a detail-free health endpoint so liveness/readiness
# probes work without leaking build, DB, or dependency information. If you need
# metrics in production, scrape them from an internal-only management port
# instead of re-exposing them here.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

logging:
  level:
    com.msfg.rag: INFO
    org.springframework: WARN
