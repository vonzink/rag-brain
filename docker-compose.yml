# Local development database: PostgreSQL 16 with the pgvector extension baked in.
# Run locally:  docker compose up -d
# Mirrors what we'll run on AWS RDS later (RDS Postgres supports pgvector natively).
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-brain-postgres
    environment:
      POSTGRES_DB: rag_brain
      POSTGRES_USER: rag_brain
      POSTGRES_PASSWORD: local_dev_only   # local only — never reuse in AWS
    ports:
      - "5435:5432"   # 5435 on host to avoid colliding with msfg-rag (5433) and msfg-web-pg (5434)
    volumes:
      - rag_brain_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_brain -d rag_brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional application container. The default local workflow starts only
  # Postgres here, then runs ./gradlew bootRun from the host. To test the app
  # image explicitly, run:
  #   docker compose --profile app up --build app
  app:
    profiles: ["app"]
    build:
      context: .
    container_name: rag-brain-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/rag_brain
      DB_USERNAME: rag_brain
      DB_PASSWORD: ${DB_PASSWORD:-local_dev_only}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY must be set (no dev default allowed under the prod profile)}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5174}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-anthropic}
      FALLBACK_AI_PROVIDER: ${FALLBACK_AI_PROVIDER:-openai}
    ports:
      - "8091:8080"
    volumes:
      - rag_brain_docdata:/app/data/documents

volumes:
  rag_brain_pgdata:
  rag_brain_docdata:
